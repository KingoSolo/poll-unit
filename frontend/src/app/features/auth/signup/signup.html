<div class="min-h-screen flex items-center justify-center p-4 md:p-16 bg-surface">
  <main class="w-full max-w-[512px]  bg-surface-container-lowest border border-outline-variant shadow-lg rounded-l p-8 md:p-12">
    <div class="flex flex-col items-center mb-10 w-full text-center">
      <div class="w-16 h-16 rounded-lg mb-4 border border-outline-variant p-1 bg-primary-container flex items-center justify-center">
        <span class="material-symbols-outlined text-primary text-[40px] leading-none">how_to_vote</span>
      </div>
      <h1 class="text-3xl font-bold text-on-surface mb-2">Create Account</h1>
      <p class="text-base text-on-surface-variant">Join pollUnit and participate in Nigerian civic initiatives.</p>
    </div>

   
    <form [formGroup]="signupForm" (ngSubmit)="signup()" class="flex flex-col gap-6">
      <div class="flex flex-col md:flex-row gap-6 md:gap-4">
        <div class="flex flex-col gap-2 w-full">
          <label for="firstName" class="text-sm font-medium text-on-surface">First Name</label>
          <div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest transition-all duration-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20">
            <mat-icon fontSet="material-symbols-outlined" class="text-outline absolute left-3">badge</mat-icon>
            <input
              id="firstName"
              type="text"
              formControlName="firstName"
              placeholder="e.g. Chinedu"
              class="w-full bg-transparent border-none py-4 pl-10 pr-3 text-base text-on-surface focus:ring-0 placeholder:text-outline-variant outline-none"
            />
          </div>
        </div>

      
        <div class="flex flex-col gap-2 w-full">
          <label for="lastName" class="text-sm font-medium text-on-surface">Last Name</label>
          <div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest transition-all duration-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20">
            <mat-icon fontSet="material-symbols-outlined" class="text-outline absolute left-3">id_card</mat-icon>
            <input
              id="lastName"
              type="text"
              formControlName="lastName"
              placeholder="e.g. Okafor"
              class="w-full bg-transparent border-none py-4 pl-10 pr-3 text-base text-on-surface focus:ring-0 placeholder:text-outline-variant outline-none"
            />
          </div>
        </div>
      </div>

      
      <div class="flex flex-col gap-2">
        <label for="email" class="text-sm font-medium text-on-surface">Email Address</label>
        <div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest transition-all duration-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20">
          <mat-icon fontSet="material-symbols-outlined" class="text-outline absolute left-3">mail</mat-icon>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="name@example.com"
            class="w-full bg-transparent border-none py-4 pl-10 pr-3 text-base text-on-surface focus:ring-0 placeholder:text-outline-variant outline-none"
          />
        </div>
      </div>

     
      <div class="flex flex-col gap-2">
        <label for="password" class="text-sm font-medium text-on-surface">Password</label>
        <div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest transition-all duration-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20">
          <mat-icon fontSet="material-symbols-outlined" class="text-outline absolute left-3">lock</mat-icon>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Create a strong password"
            class="w-full bg-transparent border-none py-4 pl-10 pr-3 text-base text-on-surface focus:ring-0 placeholder:text-outline-variant outline-none"
          />
        </div>
      </div>

     
      <div class="flex flex-col gap-2">
        <label for="state" class="text-sm font-medium text-on-surface">State of Residence</label>
        <div class="relative">
          <select
            id="state"
            formControlName="state"
            class="w-full border border-outline-variant rounded-lg py-4 pl-10 pr-10 bg-surface-container-lowest text-on-surface text-base appearance-none focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
          >
            <option disabled selected value="">Select your state</option>
            <option *ngFor="let state of states" [value]="state">{{ state }}</option>
          </select>
          <mat-icon fontSet="material-symbols-outlined" class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">location_on</mat-icon>
          <mat-icon fontSet="material-symbols-outlined" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</mat-icon>
        </div>
      </div>

      
      <div class="mt-2">
        <button
          type="submit"
          [disabled]="signupForm.invalid"
          class="w-full bg-primary hover:bg-surface-tint text-on-primary font-medium py-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          <mat-icon fontSet="material-symbols-outlined">person_add</mat-icon>
          Create Account
        </button>
      </div>
    </form>


    <div class="mt-8 pt-6 border-t border-outline-variant text-center">
      <p class="text-base text-on-surface-variant">
        Already have an account?
        <a routerLink="/login" class="text-primary font-medium hover:underline ml-1 inline-flex items-center gap-1">Log in here <mat-icon fontSet="material-symbols-outlined" class="text-base">arrow_forward</mat-icon></a>
      </p>
    </div>
  </main>
</div>
