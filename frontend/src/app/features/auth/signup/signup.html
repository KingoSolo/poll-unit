<div class="min-h-screen flex items-center justify-center p-4 md:p-16 bg-surface">
  <main class="w-full max-w-[512px] bg-surface-container-lowest border border-outline-variant shadow-lg rounded-xl p-8 md:p-12">
    <div class="flex flex-col items-center mb-10 w-full text-center">
      <div class="w-16 h-16 rounded-lg mb-6 border border-outline-variant p-1 bg-primary-container flex items-center justify-center">
        <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">how_to_vote</span>
      </div>
      <h1 class="text-3xl font-bold text-on-surface mb-2">Create Account</h1>
      <p class="text-base text-on-surface-variant">Join pollUnit and participate in Nigerian civic initiatives.</p>
    </div>

   
    <form [formGroup]="signupForm" (ngSubmit)="signup()" class="flex flex-col gap-6">
      <div class="flex flex-col md:flex-row gap-6 md:gap-4">
        <div class="flex flex-col gap-2 w-full">
          <label for="firstName" class="text-sm font-medium text-on-surface">First Name</label>
          <input
            id="firstName"
            type="text"
            formControlName="firstName"
            placeholder="e.g. Chinedu"
            class="w-full border border-outline-variant rounded-lg px-3 py-4 bg-surface-container-lowest text-on-surface text-base focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
          />
        </div>

      
        <div class="flex flex-col gap-2 w-full">
          <label for="lastName" class="text-sm font-medium text-on-surface">Last Name</label>
          <input
            id="lastName"
            type="text"
            formControlName="lastName"
            placeholder="e.g. Okafor"
            class="w-full border border-outline-variant rounded-lg px-3 py-4 bg-surface-container-lowest text-on-surface text-base focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
          />
        </div>
      </div>

      
      <div class="flex flex-col gap-2">
        <label for="email" class="text-sm font-medium text-on-surface">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="name@example.com"
          class="w-full border border-outline-variant rounded-lg px-3 py-4 bg-surface-container-lowest text-on-surface text-base focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
        />
      </div>

     
      <div class="flex flex-col gap-2">
        <label for="password" class="text-sm font-medium text-on-surface">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Create a strong password"
          class="w-full border border-outline-variant rounded-lg px-3 py-4 bg-surface-container-lowest text-on-surface text-base focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
        />
      </div>

     
      <div class="flex flex-col gap-2">
        <label for="state" class="text-sm font-medium text-on-surface">State of Residence</label>
        <div class="relative">
          <select
            id="state"
            formControlName="state"
            class="w-full border border-outline-variant rounded-lg px-3 py-4 bg-surface-container-lowest text-on-surface text-base appearance-none focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
          >
            <option disabled selected value="">Select your state</option>
            <option *ngFor="let state of states" [value]="state">{{ state }}</option>
          </select>
          <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
        </div>
      </div>

      
      <div class="mt-2">
        <button
          type="submit"
          [disabled]="signupForm.invalid"
          class="w-full bg-primary hover:bg-surface-tint text-on-primary font-medium py-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Create Account
        </button>
      </div>
    </form>


    <div class="mt-8 pt-6 border-t border-outline-variant text-center">
      <p class="text-base text-on-surface-variant">
        Already have an account?
        <a routerLink="/login" class="text-primary font-medium hover:underline ml-1">Log in here</a>
      </p>
    </div>
  </main>
</div>
