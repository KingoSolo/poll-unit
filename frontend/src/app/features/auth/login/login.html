<div class="min-h-screen flex items-center justify-center p-4 md:p-16 bg-surface">
  <main class="w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant shadow-lg rounded-xl p-8 md:p-12">
    <!-- Logo & Header -->
    <div class="flex flex-col items-center mb-8 w-full">
      <span class="material-symbols-outlined text-primary text-[64px] leading-none mb-4">how_to_vote</span>
      <h1 class="text-3xl font-bold text-on-surface mb-2">Welcome Back</h1>
      <p class="text-base text-on-surface-variant text-center">Login to access the voting portal</p>
    </div>


    <hr class="w-full border-t border-outline-variant mb-8" />

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="w-full space-y-6">
      <div class="flex flex-col gap-2">
        <label for="email" class="text-sm font-medium text-on-surface">Email Address</label>
        <div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest transition-all duration-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20">
          <mat-icon fontSet="material-symbols-outlined" class="text-outline absolute left-3">mail</mat-icon>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="citizen@example.com"
            required
            class="w-full bg-transparent border-none py-4 pl-10 pr-3 text-base text-on-surface focus:ring-0 placeholder:text-outline-variant outline-none"
          />
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <div class="flex justify-between items-center">
          <label for="password" class="text-sm font-medium text-on-surface">Password</label>
        </div>
        <div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest transition-all duration-200 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20">
          <mat-icon fontSet="material-symbols-outlined" class="text-outline absolute left-3">lock</mat-icon>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            required
            class="w-full bg-transparent border-none py-4 pl-10 pr-3 text-base text-on-surface focus:ring-0 placeholder:text-outline-variant outline-none"
          />
        </div>
      </div>

     
      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-green-700 hover:bg-primary text-on-primary-container hover:text-on-primary font-medium py-4 rounded-lg transition-colors flex justify-center items-center gap-2 mt-6 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Login
        <mat-icon fontSet="material-symbols-outlined">arrow_forward</mat-icon>
      </button>
    </form>

  
    <div class="mt-8 text-center">
      <p class="text-base text-on-surface-variant">
        Don't have an account?
        <a routerLink="/signup" class="text-primary font-medium hover:underline ml-1 inline-flex items-center gap-1">Sign up here <mat-icon fontSet="material-symbols-outlined" class="text-base">arrow_forward</mat-icon></a>
      </p>
    </div>
  </main>
</div>
