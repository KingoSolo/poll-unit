<div class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">

  <!-- Header -->
  <header class="bg-surface border-b border-outline-variant w-full top-0 z-50">
    <div class="flex justify-between items-center px-gutter py-4 w-full max-w-container-max mx-auto">
      <div class="flex items-center gap-stack-sm">
        <span class="material-symbols-outlined text-primary text-3xl">how_to_vote</span>
        <span class="text-headline-md font-headline-md font-bold text-primary">pollUnit</span>
      </div>
      <button [routerLink]="['/home']" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors text-label-md font-label-md">
        <mat-icon fontSet="material-symbols-outlined" class="text-[18px]">arrow_back</mat-icon>
        Back to Polls
      </button>
    </div>
  </header>

  <main class="flex-grow w-full max-w-container-max mx-auto px-gutter py-stack-lg">

    <!-- Loading -->
    <div *ngIf="loading" class="flex items-center justify-center py-16 text-on-surface-variant">
      Loading poll...
    </div>

    <!-- Poll content -->
    <div *ngIf="!loading && poll" class="max-w-3xl mx-auto bg-surface-container-lowest rounded-xl shadow-level-1 p-6 md:p-8 flex flex-col gap-6">

      <!-- Title -->
      <div class="flex items-start gap-4">
        <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">how_to_vote</span>
        <div class="flex-1">
          <div class="flex items-center gap-3 flex-wrap">
            <h1 class="text-2xl font-semibold text-on-surface">{{ poll.title }}</h1>
            <span [class]="'px-2.5 py-0.5 rounded-full text-label-sm font-label-sm uppercase tracking-wider ' +
              (poll.status === 'active' ? 'bg-tertiary-fixed text-primary-fixed-variant' : 'bg-surface-container-high text-on-surface-variant')">
              {{ poll.status }}
            </span>
          </div>
          <p class="text-on-surface-variant mt-2">{{ poll.description }}</p>
        </div>
      </div>

      <!-- Closed state -->
      <div *ngIf="poll.status !== 'active'"
        class="flex items-center gap-3 p-4 rounded-lg bg-surface-container-high text-on-surface-variant">
        <mat-icon fontSet="material-symbols-outlined">lock</mat-icon>
        <div>
          <p class="text-body-md font-body-md font-medium text-on-surface">This poll is closed</p>
          <p class="text-body-sm font-body-sm">Voting is no longer available.</p>
        </div>
        <button [routerLink]="['/polls', poll.id, 'results']"
          class="ml-auto flex items-center gap-1.5 px-4 py-2 rounded-lg bg-primary text-on-primary text-label-md font-label-md hover:opacity-90 transition-opacity flex-shrink-0">
          <mat-icon fontSet="material-symbols-outlined" class="text-[16px]">bar_chart</mat-icon>
          View Results
        </button>
      </div>

      <!-- Vote form (active polls only) -->
      <form *ngIf="poll.status === 'active'" [formGroup]="voteForm" (ngSubmit)="submitVote()">
        <div class="flex flex-col gap-3">
          <label *ngFor="let option of poll.options"
            class="flex items-center gap-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors cursor-pointer">
            <input type="radio" [value]="option.id" formControlName="optionId" [disabled]="hasVoted" class="h-4 w-4 accent-primary" />
            <span class="font-medium text-on-surface">{{ option.optionText }}</span>
          </label>
        </div>

        <div class="mt-6 flex items-center justify-between">
          <p *ngIf="hasVoted" class="text-body-sm font-body-sm text-on-surface-variant flex items-center gap-1">
            <mat-icon fontSet="material-symbols-outlined" class="text-[16px] text-primary">check_circle</mat-icon>
            Your vote has been recorded.
          </p>
          <span *ngIf="!hasVoted"></span>
          <button type="submit" [disabled]="voteForm.invalid || hasVoted"
            class="px-6 py-2 bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed">
            {{ hasVoted ? 'Voted' : 'Submit Vote' }}
          </button>
        </div>
      </form>

    </div>
  </main>

</div>
