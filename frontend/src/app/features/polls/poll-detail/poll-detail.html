<div class="max-w-3xl mx-auto bg-surface-container-lowest rounded-xl shadow-level-1 p-6 md:p-8">
	<div class="flex items-start gap-4">
		<span class="material-symbols-outlined text-primary text-4xl">how_to_vote</span>
		<div class="flex-1">
			<h1 class="text-2xl font-semibold text-on-surface">{{ poll?.title }}</h1>
			<p class="text-on-surface-variant mt-2">{{ poll?.description }}</p>
		</div>
	</div>

	<form [formGroup]="voteForm" (ngSubmit)="submitVote()" class="mt-6">
		<div class="flex flex-col gap-4">
			<label *ngFor="let option of poll?.options" class="flex items-center gap-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors">
				<input type="radio" [value]="option.id" formControlName="optionId" [disabled]="hasVoted" class="h-4 w-4" />
				<div class="flex-1">
					<div class="flex items-center justify-between">
						<div class="font-medium text-on-surface">{{ option.optionText }}</div>
						<div class="text-sm text-on-surface-variant">{{ option.votes || 0 }} votes</div>
					</div>
					<div *ngIf="hasVoted" class="w-full bg-surface-container-high h-2 rounded mt-2">
						<div class="bg-primary h-2 rounded" [style.width.%]="(option.votes || 0) / (poll.totalVotes || 1) * 100"></div>
					</div>
				</div>
			</label>
		</div>

		<div class="mt-6 flex items-center justify-between">
			<div class="text-sm text-on-surface-variant">{{ poll?.participants?.length || 0 }} participants</div>
			<button type="submit" [disabled]="voteForm.invalid || hasVoted" class="px-6 py-2 bg-primary text-on-primary rounded-lg hover:bg-primary-container transition-colors">
				{{ hasVoted ? 'Voted' : 'Submit Vote' }}
			</button>
		</div>
	</form>
</div>
